<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dojíždění Kroměříž → Brno – Roční analýza</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(145deg,#0a0a1a 0%,#111827 50%,#0f172a 100%);color:#e5e7eb;font-family:'DM Sans',sans-serif;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
.wrap{max-width:900px;margin:0 auto;padding:24px 16px}

h1{font-size:1.6em;font-weight:700;margin-bottom:4px}
.sub{color:#6b7280;font-size:13px}

.panel{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:20px;margin-bottom:16px}

/* Controls */
.controls{display:flex;flex-wrap:wrap;gap:20px;align-items:flex-start}
.ctrl-group label.title{display:block;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#6b7280;margin-bottom:8px;font-weight:500}
.btn-row{display:flex;gap:6px}
.btn{border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#6b7280;border-radius:12px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif}
.btn:hover{background:rgba(255,255,255,0.08);color:#d1d5db}
.btn.active-ho{background:rgba(16,185,129,0.2);color:#6ee7b7;border:2px solid rgba(16,185,129,0.5);box-shadow:0 0 12px rgba(16,185,129,0.08)}
.btn.active-ch{background:rgba(14,165,233,0.2);color:#7dd3fc;border:2px solid rgba(14,165,233,0.5)}
.btn.active-view{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2)}
.ho-btn{width:44px;height:44px;display:flex;align-items:center;justify-content:center}
.ch-btn{display:flex;flex-direction:column;align-items:center;height:44px;justify-content:center}
.ch-btn .sm{font-size:9px;opacity:0.6}

.cb-label{display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280;cursor:pointer;padding-bottom:4px}
.cb-label input{accent-color:#10b981}

/* Cards grid */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:700px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{padding:16px;border-radius:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1)}
.card .lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:#6b7280;margin-bottom:4px}
.card .val{font-size:1.3em;font-weight:700}
.card .note{font-size:10px;color:#4b5563;margin-top:4px}
.card .prefix{font-size:10px;color:#9ca3af}
.amber{color:#fcd34d;border-color:rgba(245,158,11,0.2)}
.sky{color:#7dd3fc;border-color:rgba(14,165,233,0.2)}
.rose{color:#fda4af;border-color:rgba(244,63,94,0.2)}
.emerald{color:#6ee7b7;border-color:rgba(16,185,129,0.2)}

/* Chart */
.chart-head{display:flex;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.legend{display:flex;align-items:center;gap:6px;font-size:12px;color:#9ca3af}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block}
.chart-info{margin-left:auto;font-size:11px;color:#4b5563}
.breakdown-legend{display:flex;gap:12px;font-size:10px;color:#6b7280}

svg text{user-select:none}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:center;padding:8px 6px;color:#6b7280;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.08);font-weight:500}
.tbl th:first-child{text-align:left}
.tbl td{padding:10px 6px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04)}
.tbl td:first-child{text-align:left;font-weight:500}
.tbl .hl{color:#fff;font-weight:700}

/* Summary boxes */
.summaries{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:500px){.summaries{grid-template-columns:1fr}}
.sum-box{padding:16px;border-radius:16px}
.sum-box.toyota{background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.12)}
.sum-box.tesla{background:rgba(14,165,233,0.05);border:1px solid rgba(14,165,233,0.12)}
.sum-box .title{font-weight:700;font-size:14px;margin-bottom:6px}
.sum-box .big{font-size:1.5em;font-weight:700}
.sum-box .details{font-size:11px;color:#9ca3af;margin-top:8px;line-height:1.6}

details{font-size:11px;color:#4b5563}
details summary{cursor:pointer;color:#6b7280;font-weight:500;font-size:12px}
details .inner{margin-top:8px;padding-left:8px;line-height:1.7}

/* Bar rows */
.bar-row{margin-bottom:10px}
.bar-row-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.bar-row-label{font-size:12px;color:#d1d5db;font-weight:500}
.bar-row-val{font-size:13px;font-weight:700}
.bar-row-track{height:8px;background:rgba(255,255,255,0.05);border-radius:6px;overflow:hidden}
.bar-row-fill{height:100%;border-radius:6px;transition:width 0.4s ease}
.bar-row-note{font-size:10px;color:#6b7280;margin-top:2px}

/* Range sliders */
input[type=range]{-webkit-appearance:none;appearance:none;height:6px;background:rgba(255,255,255,0.1);border-radius:4px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.2)}
</style>
</head>
<body>

<div class="wrap" id="app"></div>

<script>
// === DATA ===
const C = {
  dist: 58, // km one way
  workDays: 21,
  months: ["Led","Úno","Bře","Dub","Kvě","Čvn","Čvc","Srp","Zář","Říj","Lis","Pro"],
  toyota: { consumption: 7, insurance: 800, service: 500, stk: 150, depreciation: 200 },
  tesla: { consumption: 17, insurance: 2500, service: 300, stk: 100 },
  charge: { home: 5.5, mix: 6.5, sc: 9.4 },
  dalnicni: 192, // 2300 Kč/rok ÷ 12
};
C.dailyKm = C.dist * 2;

function recalcFixed() {
  C.toyota.fixed = C.toyota.insurance + C.toyota.service + C.toyota.stk + C.dalnicni;
  C.tesla.fixed = C.tesla.insurance + C.tesla.service + C.tesla.stk + C.dalnicni;
  C.tesla.depreciation = Math.round((state.teslaPrice * 0.12) / 12);
}

// === STATE ===
let state = { ho: 0, charging: "home", depreciation: true, view: "cumulative", benzin: 37.5, teslaPrice: 1200000 };

const fmt = n => new Intl.NumberFormat("cs-CZ",{maximumFractionDigits:0}).format(n);
const fmtK = n => Math.abs(n)>=1000 ? fmt(Math.round(n/1000))+"k" : fmt(n);

function compute() {
  recalcFixed();
  const cp = C.charge[state.charging];
  const days = C.workDays - state.ho * (C.workDays / 5);
  const monthKm = days * C.dailyKm;
  let tCum=0, eCum=0;
  const data = C.months.map((m,i) => {
    const season = 1 + 0.05 * Math.cos(i * Math.PI / 6);
    const evWinter = (i<=1||i===11)?1.15:(i===2||i===10)?1.08:1;
    const tFuel = Math.round((monthKm/100)*C.toyota.consumption*state.benzin*season);
    const eFuel = Math.round((monthKm/100)*C.tesla.consumption*cp*(state.charging==="home"?1:season)*evWinter);
    const tDepr = state.depreciation ? C.toyota.depreciation : 0;
    const eDepr = state.depreciation ? C.tesla.depreciation : 0;
    const tMonth = tFuel + C.toyota.fixed + tDepr;
    const eMonth = eFuel + C.tesla.fixed + eDepr;
    tCum += tMonth; eCum += eMonth;
    return {month:m, tFuel, eFuel, tFixed:C.toyota.fixed, eFixed:C.tesla.fixed, tDepr, eDepr, tMonth, eMonth, tCum, eCum};
  });
  return { data, days, monthKm, cp };
}

function salaryCalc(hoVal, cp) {
  const days = C.workDays - hoVal * (C.workDays/5);
  const km = days * C.dailyKm;
  const tFuel = (km/100)*C.toyota.consumption*state.benzin;
  const eFuel = (km/100)*C.tesla.consumption*cp;
  const tTotal = tFuel + C.toyota.fixed + (state.depreciation?C.toyota.depreciation:0);
  const eTotal = eFuel + C.tesla.fixed + (state.depreciation?C.tesla.depreciation:0);
  return {
    toyota: Math.max(0, Math.round((tTotal-2500)/0.72)),
    tesla: Math.max(0, Math.round((eTotal-2500)/0.72))
  };
}

// === SVG CHARTS ===
function svgCumulative(data) {
  const w=680,padL=60,padR=20,padT=20,padB=40,ch=200;
  const cw=w-padL-padR;
  const last=data[11];
  const maxY=Math.max(last.tCum,last.eCum)*1.1;
  const pt=(field)=>data.map((d,i)=>`${padL+(i/11)*cw},${padT+ch-(d[field]/maxY)*ch}`).join(" ");
  const area=(field)=>`${padL},${padT+ch} ${pt(field)} ${padL+cw},${padT+ch}`;
  const ticks=5;
  let grid="";
  for(let i=0;i<=ticks;i++){
    const y=padT+(i/ticks)*ch;
    const v=maxY*(1-i/ticks);
    grid+=`<line x1="${padL}" y1="${y}" x2="${padL+cw}" y2="${y}" stroke="white" stroke-opacity="0.06"/>`;
    grid+=`<text x="${padL-6}" y="${y+4}" text-anchor="end" fill="#6b7280" font-size="9" font-family="JetBrains Mono,monospace">${fmtK(v)}</text>`;
  }
  let xlabels=data.map((d,i)=>`<text x="${padL+(i/11)*cw}" y="${padT+ch+30}" text-anchor="middle" fill="#6b7280" font-size="9" font-family="DM Sans">${d.month}</text>`).join("");
  const tEnd=padT+ch-(last.tCum/maxY)*ch;
  const eEnd=padT+ch-(last.eCum/maxY)*ch;
  return `<svg viewBox="0 0 ${w} ${padT+ch+padB}" style="width:100%">
    <defs>
      <linearGradient id="tG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0.02"/></linearGradient>
      <linearGradient id="eG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.3"/><stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.02"/></linearGradient>
    </defs>
    ${grid}${xlabels}
    <polygon points="${area("tCum")}" fill="url(#tG)"/>
    <polygon points="${area("eCum")}" fill="url(#eG)"/>
    <polyline points="${pt("tCum")}" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linejoin="round"/>
    <polyline points="${pt("eCum")}" fill="none" stroke="#0ea5e9" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="${padL+cw}" cy="${tEnd}" r="4" fill="#fbbf24"/>
    <text x="${padL+cw-8}" y="${tEnd-10}" text-anchor="end" fill="#fbbf24" font-size="11" font-weight="bold" font-family="JetBrains Mono,monospace">${fmt(last.tCum)} Kč</text>
    <circle cx="${padL+cw}" cy="${eEnd}" r="4" fill="#38bdf8"/>
    <text x="${padL+cw-8}" y="${eEnd-10}" text-anchor="end" fill="#38bdf8" font-size="11" font-weight="bold" font-family="JetBrains Mono,monospace">${fmt(last.eCum)} Kč</text>
  </svg>`;
}

function svgMonthly(data) {
  const w=680,padL=50,padR=20,padT=20,padB=40,ch=200;
  const cw=w-padL-padR;
  const maxY=Math.max(...data.map(d=>Math.max(d.tMonth,d.eMonth)))*1.15;
  const gw=cw/12, bw=24, gap=3;
  let grid="";
  [0,0.25,0.5,0.75,1].forEach(f=>{
    const y=padT+ch*(1-f);
    grid+=`<line x1="${padL}" y1="${y}" x2="${padL+cw}" y2="${y}" stroke="white" stroke-opacity="0.06"/>`;
    grid+=`<text x="${padL-6}" y="${y+4}" text-anchor="end" fill="#6b7280" font-size="9" font-family="JetBrains Mono,monospace">${fmtK(maxY*f)}</text>`;
  });
  let bars=data.map((d,i)=>{
    const x=padL+i*gw+gw/2;
    const tH=(d.tMonth/maxY)*ch, eH=(d.eMonth/maxY)*ch;
    return `<rect x="${x-bw/2-gap}" y="${padT+ch-tH}" width="${bw}" height="${tH}" rx="3" fill="#f59e0b" fill-opacity="0.7"/>
            <rect x="${x+gap}" y="${padT+ch-eH}" width="${bw}" height="${eH}" rx="3" fill="#0ea5e9" fill-opacity="0.7"/>
            <text x="${x}" y="${padT+ch+28}" text-anchor="middle" fill="#6b7280" font-size="9" font-family="DM Sans">${d.month}</text>`;
  }).join("");
  return `<svg viewBox="0 0 ${w} ${padT+ch+padB}" style="width:100%">${grid}${bars}</svg>`;
}

function svgBreakdown(data) {
  const w=680,padL=50,padR=20,padT=20,padB=40,ch=200;
  const cw=w-padL-padR;
  const maxY=Math.max(...data.map(d=>Math.max(d.tMonth,d.eMonth)))*1.15;
  const gw=cw/12, bw=24, gap=3;
  let grid="";
  [0,0.25,0.5,0.75,1].forEach(f=>{
    const y=padT+ch*(1-f);
    grid+=`<line x1="${padL}" y1="${y}" x2="${padL+cw}" y2="${y}" stroke="white" stroke-opacity="0.06"/>`;
    grid+=`<text x="${padL-6}" y="${y+4}" text-anchor="end" fill="#6b7280" font-size="9" font-family="JetBrains Mono,monospace">${fmtK(maxY*f)}</text>`;
  });
  let bars=data.map((d,i)=>{
    const x=padL+i*gw+gw/2;
    const tStack=[{h:(d.tFuel/maxY)*ch,c:"#fbbf24"},{h:(d.tFixed/maxY)*ch,c:"#d97706"},{h:(d.tDepr/maxY)*ch,c:"#92400e"}];
    const eStack=[{h:(d.eFuel/maxY)*ch,c:"#38bdf8"},{h:(d.eFixed/maxY)*ch,c:"#0284c7"},{h:(d.eDepr/maxY)*ch,c:"#0c4a6e"}];
    let tY=padT+ch, eY=padT+ch, s="";
    tStack.forEach((b,j)=>{tY-=b.h; s+=`<rect x="${x-bw/2-gap}" y="${tY}" width="${bw}" height="${b.h}" fill="${b.c}" fill-opacity="0.85" rx="${j===2?3:0}"/>`});
    eStack.forEach((b,j)=>{eY-=b.h; s+=`<rect x="${x+gap}" y="${eY}" width="${bw}" height="${b.h}" fill="${b.c}" fill-opacity="0.85" rx="${j===2?3:0}"/>`});
    s+=`<text x="${x}" y="${padT+ch+28}" text-anchor="middle" fill="#6b7280" font-size="9" font-family="DM Sans">${d.month}</text>`;
    return s;
  }).join("");
  return `<svg viewBox="0 0 ${w} ${padT+ch+padB}" style="width:100%">${grid}${bars}</svg>`;
}

// === BAR ROW HELPER ===
function buildBarRow(label, value, total, color, note) {
  const pct = Math.max((value / total) * 100, 3);
  return `<div class="bar-row">
    <div class="bar-row-head">
      <span class="bar-row-label">${label}</span>
      <span class="bar-row-val mono" style="color:${color}">${fmt(value)} Kč</span>
    </div>
    <div class="bar-row-track">
      <div class="bar-row-fill" style="width:${pct}%;background:${color}"></div>
    </div>
    ${note ? `<div class="bar-row-note">${note}</div>` : ""}
  </div>`;
}

// === RENDER ===
function render() {
  const {data, days, monthKm, cp} = compute();
  const last = data[11];
  const diff = last.tCum - last.eCum;
  const currentAnnual = 2500*12;

  let chartSvg = "";
  if(state.view==="cumulative") chartSvg = svgCumulative(data);
  else if(state.view==="monthly") chartSvg = svgMonthly(data);
  else chartSvg = svgBreakdown(data);

  const salaryRows = [0,1,2,3].map(h => salaryCalc(h, cp));

  document.getElementById("app").innerHTML = `
    <div style="margin-bottom:20px">
      <h1>Roční náklady na dojíždění</h1>
      <p class="sub">Kroměříž (Barbořina) → Brno (AŽD, Slatina) · ${C.dist} km × 2 = ${C.dailyKm} km/den</p>
    </div>

    <div class="panel">
      <div class="controls">
        <div class="ctrl-group">
          <label class="title">Home Office / týden</label>
          <div class="btn-row">
            ${[0,1,2,3].map(h=>`<button class="btn ho-btn ${state.ho===h?"active-ho":""}" onclick="setState('ho',${h})">${h}×</button>`).join("")}
          </div>
        </div>
        <div class="ctrl-group">
          <label class="title">Nabíjení Tesla</label>
          <div class="btn-row">
            ${[{k:"home",l:"🏠 Doma",s:"5,5 Kč"},{k:"mix",l:"🔄 Mix",s:"6,5 Kč"},{k:"sc",l:"⚡ SC",s:"9,4 Kč"}].map(s=>
              `<button class="btn ch-btn ${state.charging===s.k?"active-ch":""}" onclick="setState('charging','${s.k}')">${s.l}<span class="sm">${s.s}/kWh</span></button>`
            ).join("")}
          </div>
        </div>
        <div style="display:flex;align-items:flex-end;padding-bottom:4px">
          <label class="cb-label"><input type="checkbox" ${state.depreciation?"checked":""} onchange="setState('depreciation',this.checked)"> Amortizace</label>
        </div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:20px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06)">
        <div class="ctrl-group" style="flex:1;min-width:200px">
          <label class="title">Cena benzínu: <span id="lbl-benzin" class="mono" style="color:#fcd34d">${state.benzin.toFixed(1)} Kč/l</span></label>
          <input type="range" min="30" max="50" step="0.5" value="${state.benzin}"
            oninput="sliderPreview('benzin',parseFloat(this.value),'lbl-benzin')"
            onchange="sliderCommit('benzin',parseFloat(this.value))"
            style="width:100%;accent-color:#f59e0b">
        </div>
        <div class="ctrl-group" style="flex:1;min-width:200px">
          <label class="title">Cena Tesla Y: <span id="lbl-tesla" class="mono" style="color:#7dd3fc">${fmt(state.teslaPrice)} Kč</span></label>
          <input type="range" min="800000" max="1600000" step="10000" value="${state.teslaPrice}"
            oninput="sliderPreview('teslaPrice',parseFloat(this.value),'lbl-tesla')"
            onchange="sliderCommit('teslaPrice',parseFloat(this.value))"
            style="width:100%;accent-color:#0ea5e9">
        </div>
      </div>
    </div>

    <div class="cards">
      <div class="card amber"><div class="lbl">Toyota / rok</div><div class="val mono amber">${fmt(last.tCum)} Kč</div></div>
      <div class="card sky"><div class="lbl">Tesla / rok</div><div class="val mono sky">${fmt(last.eCum)} Kč</div></div>
      <div class="card ${diff>0?"sky":"amber"}">
        <div class="lbl">Rozdíl / rok</div>
        <div class="prefix">${diff>0?"Tesla levnější o":"Toyota levnější o"}</div>
        <div class="val mono ${diff>0?"sky":"amber"}">${fmt(Math.abs(diff))} Kč</div>
      </div>
      <div class="card rose">
        <div class="lbl">Navíc vs teď / rok</div>
        <div class="val mono rose">${fmt(Math.min(last.tCum,last.eCum)-currentAnnual)} Kč</div>
        <div class="note">(teď: ${fmt(currentAnnual)} Kč/rok)</div>
      </div>
    </div>

    <div style="display:flex;gap:6px;margin-bottom:12px">
      ${[{k:"cumulative",l:"Kumulativní"},{k:"monthly",l:"Po měsících"},{k:"breakdown",l:"Rozpad nákladů"}].map(t=>
        `<button class="btn ${state.view===t.k?"active-view":""}" onclick="setState('view','${t.k}')">${t.l}</button>`
      ).join("")}
    </div>

    <div class="panel">
      <div class="chart-head">
        <div class="legend"><span class="dot" style="background:#f59e0b"></span> Toyota Yaris</div>
        <div class="legend"><span class="dot" style="background:#0ea5e9"></span> Tesla Model Y</div>
        ${state.view==="breakdown"?`<div class="breakdown-legend"><span>■ světlá = palivo</span><span>■ střední = fixní</span><span>■ tmavá = amortizace</span></div>`:""}
        <div class="chart-info">${state.ho}× HO · ${Math.round(days)} dní/měs · ${fmt(Math.round(monthKm))} km/měs</div>
      </div>
      ${chartSvg}
    </div>

    <div class="panel" style="border-color:rgba(16,185,129,0.2)">
      <h3 style="font-weight:700;color:#6ee7b7;margin-bottom:4px">💰 Kolik si říct navíc (hrubá mzda / měsíc)</h3>
      <p style="font-size:10px;color:#6b7280;margin-bottom:12px">Stávající 2 500 Kč/měs na auto nestačí. Tabulka ukazuje potřebné navýšení hrubé mzdy.</p>
      <table class="tbl">
        <thead><tr><th style="text-align:left">Scénář</th>${[0,1,2,3].map(h=>`<th class="${state.ho===h?"hl":""}" style="color:${state.ho===h?"#6ee7b7":"#6b7280"}">${h===0?"0 HO":h+"× HO"}</th>`).join("")}</tr></thead>
        <tbody>
          <tr>
            <td style="color:#fcd34d">🚗 Toyota</td>
            ${salaryRows.map((r,i)=>`<td class="mono ${state.ho===i?"hl":""}" style="color:${state.ho===i?"#fff":"#9ca3af"}">+${fmt(r.toyota)} Kč</td>`).join("")}
          </tr>
          <tr>
            <td style="color:#7dd3fc">⚡ Tesla</td>
            ${salaryRows.map((r,i)=>`<td class="mono ${state.ho===i?"hl":""}" style="color:${state.ho===i?"#fff":"#9ca3af"}">+${fmt(r.tesla)} Kč</td>`).join("")}
          </tr>
        </tbody>
      </table>
      <p style="font-size:10px;color:#4b5563;margin-top:8px">* Přepočet čistá → hrubá: ÷ 0.72 (daně + odvody ~28%)</p>
    </div>

    <div class="summaries">
      <div class="sum-box toyota">
        <div class="title" style="color:#fcd34d">🚗 Toyota Yaris 2011 – roční rozpad</div>
        <div class="big mono" style="color:#fde68a">${fmt(last.tCum)} Kč / rok</div>
        <div style="margin-top:14px">
          ${buildBarRow("Palivo (benzín)", data.reduce((s,d)=>s+d.tFuel,0), last.tCum, "#fbbf24", fmt(Math.round(monthKm*12))+" km/rok · "+C.toyota.consumption+" l/100km · "+state.benzin.toFixed(1)+" Kč/l")}
          ${buildBarRow("Pojištění", C.toyota.insurance*12, last.tCum, "#f59e0b", "povinné ručení + havarijní (starší vůz)")}
          ${buildBarRow("Servis a údržba", C.toyota.service*12, last.tCum, "#d97706", "olej, brzdy, filtry, tekutiny…")}
          ${buildBarRow("STK + emise", C.toyota.stk*12, last.tCum, "#b45309", "rozpočet na kontroly")}
          ${buildBarRow("Dálniční známka", C.dalnicni*12, last.tCum, "#92400e", "2 300 Kč/rok")}
          ${state.depreciation ? buildBarRow("Amortizace", C.toyota.depreciation*12, last.tCum, "#78350f", "auto za ~80 000 Kč, minimální ztráta") : ""}
        </div>
      </div>
      <div class="sum-box tesla">
        <div class="title" style="color:#7dd3fc">⚡ Tesla Model Y LR RWD – roční rozpad</div>
        <div class="big mono" style="color:#bae6fd">${fmt(last.eCum)} Kč / rok</div>
        <div style="margin-top:14px">
          ${buildBarRow("Energie (elektřina)", data.reduce((s,d)=>s+d.eFuel,0), last.eCum, "#38bdf8", fmt(Math.round(monthKm*12))+" km/rok · "+C.tesla.consumption+" kWh/100km · "+cp+" Kč/kWh")}
          ${buildBarRow("Pojištění", C.tesla.insurance*12, last.eCum, "#0ea5e9", "povinné ručení + havarijní (nový vůz ~"+fmt(state.teslaPrice)+")")}
          ${buildBarRow("Servis a údržba", C.tesla.service*12, last.eCum, "#0284c7", "méně pohyblivých dílů, bez oleje")}
          ${buildBarRow("STK + emise", C.tesla.stk*12, last.eCum, "#0369a1", "rozpočet na kontroly")}
          ${buildBarRow("Dálniční známka", C.dalnicni*12, last.eCum, "#075985", "2 300 Kč/rok")}
          ${state.depreciation ? buildBarRow("Amortizace", C.tesla.depreciation*12, last.eCum, "#0c4a6e", "12%/rok z "+fmt(state.teslaPrice)+" Kč") : ""}
        </div>
      </div>
    </div>

    <details>
      <summary>Předpoklady</summary>
      <div class="inner">
        • 58 km jedním směrem · Benzín ${state.benzin.toFixed(1)} Kč/l · Tesla spotřeba ~17 kWh/100km reálná<br>
        • Sezónní korekce: zima +5% palivo, Tesla +15% spotřeba (Dec–Feb), +8% přechodné měsíce<br>
        • Pojištění Toyota 800 Kč/měs, Tesla 2 500 Kč/měs · Servis T 500, E 300 Kč/měs<br>
        • Dálniční známka: 2 300 Kč/rok (obě auta)<br>
        • Amortizace Toyota 200 Kč/měs (auto za ~80k), Tesla ${fmt(C.tesla.depreciation)} Kč/měs (12%/rok z ${fmt(state.teslaPrice)} Kč)<br>
        • Tesla Model Y LR RWD cena: ${fmt(state.teslaPrice)} Kč
      </div>
    </details>
  `;
}

let _rafId = null;
function setState(key, val) {
  state[key] = val;
  if (_rafId) cancelAnimationFrame(_rafId);
  _rafId = requestAnimationFrame(() => { _rafId = null; render(); });
}

// Sliders use onchange (fires on release) to avoid losing focus during drag
// oninput just updates the displayed value label without full re-render
function sliderPreview(key, val, labelId) {
  state[key] = val;
  const el = document.getElementById(labelId);
  if (el) {
    if (key === 'benzin') el.textContent = val.toFixed(1) + ' Kč/l';
    if (key === 'teslaPrice') el.textContent = fmt(val) + ' Kč';
  }
}
function sliderCommit(key, val) {
  state[key] = val;
  render();
}

render();
</script>
</body>
</html>
